[package]
name = "workflowy-mcp-server"
version = "2.0.0"
edition = "2021"
description = "MCP server for Workflowy content management, built with rmcp"
license = "MIT"

[[bin]]
name = "workflowy-mcp-server"
path = "src/main.rs"

[[bin]]
name = "task-map"
path = "src/cli/task_map.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
dotenv = "0.15"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
regex = "1.10"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
parking_lot = "0.12"
clap = { version = "4.4", features = ["derive"] }
futures = "0.3"
lazy_static = "1.4"
rand = "0.8"
rmcp = { version = "0.16", features = ["server", "transport-io"] }
schemars = "1.0"
sha2 = "0.10"

[dev-dependencies]
pretty_assertions = "1.4"
tokio-test = "0.4"
proptest = "1.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
